# ============================================================================
# ESPHome HEMS with EEBus LPC – §14a EnWG compliant
# Bernd Gewehr / bg-hems branch
#
# Hardware: ESP32 Hutschienen-Gerät mit 8× DI/DO + Ethernet (z.B. Olimex
#           ESP32-POE oder LILYGO T-Internet-POE)
#
# Steuerbare Verbrauchseinrichtungen:
#   - Bosch Compress 5800i Wärmepumpe  → SG-Ready via DO1/DO2
#   - Shell Recharge Wallbox           → Modbus TCP Ladestrom
#
# §14a Steuerung:
#   Option A (Relaiskontakt, bis 31.12.2028):  DI1 von CLS-Steuerbox
#   Option B (EEBus LPC, zukunftssicher):       eebus_lpc component
#
# Diese Datei zeigt Option B (EEBus) mit Option A als Fallback.
# ============================================================================

esphome:
  name: hems-14a
  friendly_name: "HEMS §14a"
  platform: ESP32
  board: esp32-poe-iso   # Olimex ESP32-POE-ISO (Ethernet + 8 I/O)
  framework:
    type: esp-idf

# Externe Komponente aus dem bg-hems Branch
external_components:
  - source: github://bgewehr/openeebus@bg-hems
    components: [eebus_lpc]
    refresh: 1d

# Ethernet statt WiFi (empfohlen für EEBus Zuverlässigkeit)
ethernet:
  type: LAN8720
  mdc_pin: GPIO23
  mdio_pin: GPIO18
  clk_mode: GPIO17_OUT
  phy_addr: 0

logger:
  level: INFO

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

# ============================================================================
# EEBus LPC – Empfang des Steuerbefehls vom Netzbetreiber (Westnetz)
# ============================================================================
eebus_lpc:
  id: hems_lpc
  ship_port: 4712
  # SKI der Westnetz CLS-Steuerbox – beim Pairing aus dem Steuerbox-Display
  # oder per mDNS-Scan ermitteln. Leer lassen für Auto-Accept (nur Test!).
  remote_ski: ""   # TODO: "aabbccddeeffaabbccddeeff..." eintragen
  device_brand: "DIY"
  device_type: "HEMS"
  device_model: "ESP32-HEMS-14a"
  failsafe_limit_w: 4200.0   # §14a Mindestleistung

  # Steuerungsfall aktiv: VNB begrenzt Leistung
  on_limit_active:
    - then:
        - lambda: |-
            float limit_w = x;
            ESP_LOGI("hems", "VNB Leistungsbegrenzung aktiv: %.0f W", limit_w);

            // Mindestleistungs-Wächter: WP-Mindestleistung ca. 3900 W
            // Wallbox bekommt was übrig bleibt (min. 6A = 1380 W)
            float wallbox_limit = limit_w - 3900.0f;
            if (wallbox_limit < 1380.0f) {
              // WP muss auch reduziert werden
              // SG-Ready Modus 1 (EVU-Sperre): DO1=0, DO2=0
              id(sg_ready_bit1).turn_off();
              id(sg_ready_bit2).turn_off();
              wallbox_limit = limit_w; // Wallbox bekommt alles
            } else {
              // WP normal (Modus 2): DO1=1, DO2=0
              id(sg_ready_bit1).turn_on();
              id(sg_ready_bit2).turn_off();
            }

            // Wallbox-Ladestrom setzen (6–16 A, 3-phasig)
            float current_a = wallbox_limit / (3.0f * 230.0f);
            if (current_a < 6.0f)  current_a = 6.0f;
            if (current_a > 16.0f) current_a = 16.0f;
            id(wallbox_ladestrom).set_value(current_a);

  # Steuerungsfall beendet: Normalbetrieb wiederherstellen
  on_limit_cleared:
    - then:
        - lambda: |-
            ESP_LOGI("hems", "VNB Steuerung beendet, Normalbetrieb");
            // WP Modus 2 (Normal): DO1=1, DO2=0
            id(sg_ready_bit1).turn_on();
            id(sg_ready_bit2).turn_off();
            // Wallbox Maximalstrom
            id(wallbox_ladestrom).set_value(16.0f);

# ============================================================================
# Fallback: Relaiskontakt von CLS-Steuerbox (DI1) — Option A bis 2028
# ============================================================================
binary_sensor:
  - platform: gpio
    pin:
      number: GPIO4
      mode: INPUT_PULLUP
      inverted: true   # Schließer = aktiv (Steuerungsfall)
    name: "VNB Steuersignal (Relais)"
    id: vnb_relay_signal
    device_class: power
    on_press:
      # CLS-Relais aktiv → gleiche Logik wie EEBus on_limit_active
      - lambda: |-
          id(sg_ready_bit1).turn_off();
          id(sg_ready_bit2).turn_off();
          id(wallbox_ladestrom).set_value(6.0f);
    on_release:
      - lambda: |-
          id(sg_ready_bit1).turn_on();
          id(sg_ready_bit2).turn_off();
          id(wallbox_ladestrom).set_value(16.0f);

# ============================================================================
# SG-Ready Ausgänge für Bosch Compress 5800i
# DO1 = SG-Ready Bit 1, DO2 = SG-Ready Bit 2
# ============================================================================
switch:
  - platform: gpio
    pin: GPIO18
    name: "SG-Ready Bit 1 (DO1)"
    id: sg_ready_bit1
    restore_mode: RESTORE_DEFAULT_ON   # Modus 2 nach Neustart

  - platform: gpio
    pin: GPIO19
    name: "SG-Ready Bit 2 (DO2)"
    id: sg_ready_bit2
    restore_mode: RESTORE_DEFAULT_OFF  # Bit2=0 → Modus 2 (Normal)

# ============================================================================
# Wallbox Ladestrom via Modbus TCP
# ============================================================================
modbus:
  id: modbus_tcp_client
  uart_id: uart_bus   # Nicht benötigt bei TCP

modbus_controller:
  - id: wallbox_ctrl
    address: 0x01
    modbus_id: modbus_tcp_client
    update_interval: 10s
    # Für Modbus TCP: host und port im code_template
    # Shell Recharge Modbus Register für Ladestrom-Sollwert: Reg 261 (0x0105)

number:
  - platform: modbus_controller
    modbus_controller_id: wallbox_ctrl
    name: "Wallbox Ladestrom Sollwert"
    id: wallbox_ladestrom
    register_type: holding
    address: 261   # Shell Recharge: Charging Current Setpoint
    value_type: U_WORD
    min_value: 6
    max_value: 16
    step: 1
    unit_of_measurement: "A"
    lambda: "return x / 10.0;"       # Gerät sendet in 0.1A
    write_lambda: "return x * 10.0;" # Schreiben in 0.1A

# ============================================================================
# Sensoren
# ============================================================================
sensor:
  - platform: template
    name: "VNB Leistungslimit"
    id: vnb_power_limit
    unit_of_measurement: "W"
    accuracy_decimals: 0
    lambda: |-
      return id(hems_lpc).current_limit_w();
    update_interval: 5s

  - platform: template
    name: "HEMS Betriebsmodus"
    id: hems_mode
    lambda: |-
      return id(hems_lpc).is_limit_active() ? 1.0 : 0.0;
    update_interval: 5s

# ============================================================================
# Diagnoseinformationen
# ============================================================================
text_sensor:
  - platform: template
    name: "EEBus Status"
    lambda: |-
      if (id(hems_lpc).is_limit_active()) {
        char buf[32];
        snprintf(buf, sizeof(buf), "Limit aktiv: %.0f W",
                 id(hems_lpc).current_limit_w());
        return std::string(buf);
      }
      return std::string("Normalbetrieb");
    update_interval: 10s

# ============================================================================
# Web Server – HEMS Status UI
# Erreichbar unter http://<ip-adresse>/
# Alle Entities erscheinen automatisch gruppiert nach Kategorie.
# "area" gruppiert zusammengehörige Geräte im Dashboard.
# ============================================================================
web_server:
  port: 80
  version: 3          # Version 3 hat besseres Layout und Gruppenunterstützung
  include_internal: false

# Damit die Entities im Web UI sauber als HEMS-Rubrik erscheinen,
# werden sie über "entity_category" und aussagekräftige Namen strukturiert.
# ESPHome Web Server v3 gruppiert automatisch nach Typ (sensor/switch/number).

# ============================================================================
# Zusätzliche Web-UI Entities — Status-Übersicht
# ============================================================================

# Bereits definierte Entities bekommen über ihre Namen
# eine logische Gruppierung:
#
#  SENSOREN (Messwerte)
#    "VNB Leistungslimit [W]"      ← aktuelles EEBus-Limit
#    "Wallbox Ladestrom Sollwert"  ← aktuell gesetzter Strom
#    "HEMS Betriebsmodus"          ← 0=Normal, 1=Gedimmt
#
#  TEXT-SENSOREN (Status)
#    "EEBus Status"                ← Klartextmeldung
#    "SG-Ready Modus"              ← aktueller WP-Modus
#    "§14a Steuerungskanal"        ← EEBus oder Relais
#
#  SCHALTER (nur Diagnose, kein Normalbetrieb)
#    "SG-Ready Bit 1 (DO1)"
#    "SG-Ready Bit 2 (DO2)"
#
#  ZAHL (Einstellung)
#    "Wallbox Ladestrom Sollwert"

# Zusätzliche Text-Sensoren für das Web UI
text_sensor:
  - platform: template
    name: "SG-Ready Modus"
    icon: "mdi:heat-pump"
    update_interval: 5s
    lambda: |-
      bool b1 = id(sg_ready_bit1).state;
      bool b2 = id(sg_ready_bit2).state;
      if (!b1 && !b2) return std::string("Modus 1 – EVU-Sperre");
      if ( b1 && !b2) return std::string("Modus 2 – Normalbetrieb");
      if (!b1 &&  b2) return std::string("Modus 3 – PV-Empfehlung");
      return                 std::string("Modus 4 – Maximalleistung");

  - platform: template
    name: "§14a Steuerungskanal"
    icon: "mdi:transmission-tower"
    update_interval: 10s
    lambda: |-
      // Zeigt ob aktuell EEBus oder Relaiskontakt aktiv steuert
      if (id(hems_lpc).is_limit_active())
        return std::string("EEBus (digital)");
      if (id(vnb_relay_signal).state)
        return std::string("Relaiskontakt (FNN-2bit)");
      return std::string("Kein Eingriff aktiv");

  - platform: template
    name: "Mindestleistung §14a"
    icon: "mdi:lightning-bolt-circle"
    update_interval: 60s
    lambda: |-
      // Statisch: gesetzliche Mindestleistung 4200 W
      return std::string("4200 W (gesetzl. Minimum)");
    entity_category: diagnostic

# Sensor: Wallbox Ist-Leistung (aus Modbus lesen)
sensor:
  - platform: modbus_controller
    modbus_controller_id: wallbox_ctrl
    name: "Wallbox Ist-Leistung"
    icon: "mdi:ev-station"
    register_type: holding
    address: 300        # Shell Recharge: Active Power Total (Register prüfen)
    value_type: U_WORD
    unit_of_measurement: "W"
    accuracy_decimals: 0
    filters:
      - multiply: 1.0

  - platform: template
    name: "Verfügbare Restleistung"
    icon: "mdi:gauge"
    unit_of_measurement: "W"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      // Zeigt wie viel vom VNB-Limit noch frei ist
      if (!id(hems_lpc).is_limit_active()) return 99999.0f;
      return id(hems_lpc).current_limit_w() - 3900.0f; // WP-Reserve abziehen

# Button für manuelle Steuerung / Test
button:
  - platform: template
    name: "Failsafe testen (4200 W)"
    icon: "mdi:shield-check"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          // Simuliert VNB-Eingriff auf Mindestleistung (nur für Tests)
          id(sg_ready_bit1).turn_off();
          id(sg_ready_bit2).turn_off();
          id(wallbox_ladestrom).set_value(6.0f);
          ESP_LOGW("hems", "Failsafe-Test aktiviert");

  - platform: template
    name: "Normalbetrieb wiederherstellen"
    icon: "mdi:restore"
    entity_category: diagnostic
    on_press:
      - lambda: |-
          id(sg_ready_bit1).turn_on();
          id(sg_ready_bit2).turn_off();
          id(wallbox_ladestrom).set_value(16.0f);
          ESP_LOGI("hems", "Normalbetrieb manuell wiederhergestellt");
